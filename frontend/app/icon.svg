<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- White background -->
  <rect width="64" height="64" fill="white"/>
  <!-- SNKRS text -->
  <text x="33" y="26" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="13" text-anchor="middle" fill="#000" letter-spacing="-0.5">SNKRS</text>
  <!-- CART text -->
  <text x="36" y="38" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="13" text-anchor="middle" fill="#000" letter-spacing="1">CART</text>
  <!-- Cart handle arm -->
  <line x1="4" y1="16" x2="18" y2="16" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left diagonal -->
  <line x1="18" y1="16" x2="11" y2="46" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom -->
  <line x1="11" y1="46" x2="58" y2="46" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right wall -->
  <line x1="58" y1="46" x2="62" y2="15" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Top rim -->
  <line x1="18" y1="15" x2="62" y2="15" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left wheel -->
  <circle cx="22" cy="54" r="4.5" fill="#000"/>
  <!-- Right wheel -->
  <circle cx="47" cy="54" r="4.5" fill="#000"/>
</svg>
