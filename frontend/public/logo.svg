<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 320" fill="none">
  <!-- Cart text: SNKRS -->
  <text x="155" y="130" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="68" text-anchor="middle" fill="#000000" letter-spacing="-1">SNKRS</text>
  <!-- Cart text: CART -->
  <text x="172" y="195" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="68" text-anchor="middle" fill="#000000" letter-spacing="2">CART</text>

  <!-- Cart body outline (trapezoidal, open at top-left for text) -->
  <!-- Top-left handle arm -->
  <line x1="18" y1="80" x2="90" y2="80" stroke="#000" stroke-width="13" stroke-linecap="round"/>
  <!-- Diagonal left wall (arm to bottom-left) -->
  <line x1="90" y1="80" x2="55" y2="230" stroke="#000" stroke-width="13" stroke-linecap="round"/>
  <!-- Bottom base line -->
  <line x1="55" y1="230" x2="295" y2="230" stroke="#000" stroke-width="13" stroke-linecap="round"/>
  <!-- Right side wall -->
  <line x1="295" y1="230" x2="318" y2="75" stroke="#000" stroke-width="13" stroke-linecap="round"/>
  <!-- Top right (cart rim) -->
  <line x1="90" y1="75" x2="318" y2="75" stroke="#000" stroke-width="13" stroke-linecap="round"/>

  <!-- Left wheel -->
  <circle cx="110" cy="272" r="22" fill="#000"/>
  <!-- Right wheel -->
  <circle cx="248" cy="272" r="22" fill="#000"/>
</svg>
