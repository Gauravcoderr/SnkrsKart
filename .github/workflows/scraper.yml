name: Sneaker Scraper

on:
  schedule:
    - cron: '47 19 * * *'   # 01:17 AM IST — off-peak, looks human
    - cron: '13 23 * * *'   # 04:43 AM IST — second window
  workflow_dispatch:          # manual trigger from admin panel

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install scraper dependencies
        run: cd .github/scripts/scraper && npm install

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome
        working-directory: .github/scripts/scraper

      - name: Run scraper
        run: cd .github/scripts/scraper && npx ts-node --project tsconfig.json run.ts
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
